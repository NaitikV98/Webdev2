<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //JS Data Value Types
        //Primitive - immutable single value data type in js
        //Sting, Number, Boolean, Null, Undefined, Symbol and BigInt
        
        //string
        var myName = "Naitik";
        console.log(myName);
        //number
        var myAge = 22;
        console.log(myAge);
        console.log(myName+" my age is "+myAge);
      //boolean
        var isMarried = false;
        console.log(myName+" is married "+isMarried);
        var myAddress = null;
        console.log(myAddress);
        console.log(typeof myAddress);
        var myPhoneNumber=BigInt(328432987421642176219821749);
        console.log(myPhoneNumber);
        console.log(typeof myPhoneNumber);
        //symbol
        var var1="naitik";
        var var2="naitik";
        console.log(var1==var2);
        //Reference Type(Object)--mutable in memory and keep the data in key value pair.
        // object{},function(),array[]
        let myInfo={
              name:"Naitik",
                age:18,
                isMarried:false,
                address:{
                    city:"Chandausi",
                    state:"Uttar Pradesh",
                    country:"India"
                }
        };
        console.log(myInfo);
        console.log(myInfo.name);
        var keys=Object.keys(myInfo);
        console.log(keys.length);

        //funtion - block of code which perform a specific task.
         
        function cal(){
            var num1=45;
            var num2=40;
            var add=num1+num2;
            console.log("the addition is "+add); 
        }
    cal();
    //array - collection of data which is ordered and indexed.
    let studentList=["Naitik","Abes","Rohit","Satyarth"];
    console.log(studentList);
    console.log(studentList[0]);
    //for different data type in array
    let stu1=["Naitik",22,false,"Chandausi","Uttar Pradesh","India"];
    console.log(stu1);

    // to itterate array members
    for(let i=0;i<studentList.length;i++){
        console.log(studentList[i]);
    }
    for(let x in stu1){
        console.log(stu1[x]);
    }
    </script>
    
</body>
</html>
